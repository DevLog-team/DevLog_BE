plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.14'
    id 'io.spring.dependency-management' version '1.1.7'

    /* REST Docs + OpenAPI */
    id 'com.epages.restdocs-api-spec' version '0.19.2'
    id 'org.hidetake.swagger.generator' version '2.18.2'
}

group = 'com.project'
version = '0.0.1-SNAPSHOT'
description = 'DevLog'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    /*WEB*/
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    /*SECURITY*/
    implementation 'org.springframework.boot:spring-boot-starter-security'

    /*JJWT*/
    implementation 'io.jsonwebtoken:jjwt-api:0.12.3'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.3'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.3'

    /*JPA & DB & REDIS*/
    implementation('com.oracle.database.jdbc:ojdbc11-production') {
        // Logback 파서와 충돌을 일으키는 오라클 전용 XML 파서를 의존성에서 완전히 제외합니다.
        exclude group: 'com.oracle.database.xml', module: 'xmlparserv2'
    }
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'

    /* QueryDSL */
    implementation 'com.querydsl:querydsl-jpa:5.0.0:jakarta'
    annotationProcessor "com.querydsl:querydsl-apt:5.0.0:jakarta"
    annotationProcessor "jakarta.annotation:jakarta.annotation-api"
    annotationProcessor "jakarta.persistence:jakarta.persistence-api"

    /*LOMBOK*/
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    /*TEST*/
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'

    /* REST DOCS */
    testImplementation 'org.springframework.restdocs:spring-restdocs-mockmvc'
    testImplementation 'org.springframework.restdocs:spring-restdocs-asciidoctor'

    /* OPEN API */
    testImplementation 'com.epages:restdocs-api-spec-mockmvc:0.19.2'

    /* TEST CONTAINERS */
    testImplementation 'org.testcontainers:junit-jupiter:1.19.0'
    testImplementation 'org.testcontainers:oracle-xe:1.19.0'
    testImplementation 'com.redis:testcontainers-redis:2.1.0'

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
}


/* QueryDSL */

def querydslDir = layout.buildDirectory.dir("generated/querydsl").get().asFile

clean {
    delete querydslDir
}

sourceSets {
    main {
        java {
            srcDirs += querydslDir
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.generatedSourceOutputDirectory = querydslDir
}



/* REST DOCS & OPEN API */

ext {
    snippetsDir = file("build/generated-snippets")
}

tasks.named('test') {
    useJUnitPlatform()
    outputs.dir snippetsDir
}

openapi3 {
    server = 'http://localhost:8080'
    title = 'DevLog API'
    description = 'DevLog API Documentation'
    version = '0.1.0'
    format = 'yaml'
}

tasks.register('copyOasToSwagger', Copy) {
    dependsOn 'test', 'openapi3'

    from(layout.buildDirectory.file("api-spec/openapi3.yaml"))

    into(layout.buildDirectory.dir("resources/main/static/swagger-ui"))

    into(file("src/main/resources/static/swagger-ui"))
}

tasks.named('bootJar') {
    dependsOn 'copyOasToSwagger'
}