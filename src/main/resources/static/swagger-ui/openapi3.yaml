openapi: 3.0.1
info:
  title: DevLog API
  description: DevLog API Documentation
  version: 0.1.0
servers:
- url: http://localhost:8080
tags: []
paths:
  /api/login:
    post:
      tags:
      - Auth
      summary: 로그인 API
      description: 로그인 API
      operationId: 로그인 성공
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              로그인 성공:
                value: "{\"email\":\"test@naver.com\",\"password\":\"testpw1234\"}"
      responses:
        "200":
          description: "200"
          headers:
            Authorization:
              description: 엑세스 토큰을 Header Authorization에 담아서 응답
              schema:
                type: string
            Set-Cookie:
              description: 리프레시 토큰을 HttpOnly 쿠키에 담아서 응답
              schema:
                type: string
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              examples:
                로그인 성공:
                  value: "{\"status\":\"SUCCESS\",\"body\":{\"userId\":1,\"email\"\
                    :\"test@naver.com\",\"name\":\"test\"},\"timestamp\":\"2026-05-27T19:17:49.4590288\"\
                    }"
  /api/logout:
    post:
      tags:
      - Auth
      summary: 로그아웃 API
      description: 로그아웃 API
      operationId: 로그아웃 성공
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-logout229656191"
              examples:
                로그아웃 성공:
                  value: "{\"status\":\"SUCCESS\",\"body\":null,\"timestamp\":\"2026-05-27T19:17:49.7190403\"\
                    }"
  /api/project:
    post:
      tags:
      - Project
      summary: 프로젝트 생성 API
      description: 프로젝트 생성 API
      operationId: 프로젝트 생성 성공
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
            examples:
              프로젝트 생성 성공:
                value: "{\"title\":\"스프링부트 프로젝트\",\"description\":\"개발 프로젝트 설명입니다\
                  .\",\"status\":\"ACTIVE\",\"role\":\"OWNER\",\"startDate\":\"2026-05-27\"\
                  ,\"endDate\":\"2026-08-27\"}"
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProjectResponse"
              examples:
                프로젝트 생성 성공:
                  value: "{\"status\":\"SUCCESS\",\"body\":{\"projectId\":1},\"timestamp\"\
                    :\"2026-05-27T19:17:50.8136911\"}"
  /api/projects:
    get:
      tags:
      - Project
      summary: 사용자가 참여 중인 프로젝트 목록을 조회합니다. 페이징 및 동적 검색을 지원합니다.
      description: 사용자가 참여 중인 프로젝트 목록을 조회합니다. 페이징 및 동적 검색을 지원합니다.
      operationId: 프로젝트 목록 조회 성공
      parameters:
      - name: title
        in: query
        description: 프로젝트 제목 검색 키워드 (부분 일치)
        required: false
        schema:
          type: string
      - name: status
        in: query
        description: 프로젝트 상태 필터링
        required: false
        schema:
          type: string
      - name: page
        in: query
        description: "페이지 번호 (0부터 시작, 기본값: 0)"
        required: false
        schema:
          type: string
      - name: size
        in: query
        description: "한 페이지 당 조회 개수 (기본값: 10)"
        required: false
        schema:
          type: string
      - name: sort
        in: query
        description: "정렬 기준 및 방향 (기본값: createdAt,desc)"
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
              examples:
                프로젝트 목록 조회 성공:
                  value: "{\"status\":\"SUCCESS\",\"body\":{\"content\":[{\"projectId\"\
                    :1,\"title\":\"스프링부트 프로젝트\",\"description\":\"개발 프로젝트 설명입니다.\"\
                    ,\"status\":\"ACTIVE\",\"endDate\":\"2026-08-27\",\"totalTaskCount\"\
                    :10,\"completedTaskCount\":6,\"inProgressTaskCount\":4,\"progressRate\"\
                    :0.6}],\"pageInfo\":{\"currentPage\":1,\"pageSize\":10,\"totalElements\"\
                    :1,\"totalPages\":1,\"isFirst\":true,\"isLast\":true}},\"timestamp\"\
                    :\"2026-05-27T19:17:50.6202396\"}"
  /api/reissue:
    post:
      tags:
      - Auth
      summary: 리프레시 토큰 재발급 API
      description: 리프레시 토큰 재발급 API
      operationId: '토큰 재발급 '
      responses:
        "200":
          description: "200"
          headers:
            Authorization:
              description: 엑세스 토큰을 Header Authorization에 담아서 응답
              schema:
                type: string
            Set-Cookie:
              description: 리프레시 토큰을 HttpOnly 쿠키에 담아서 응답
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-logout229656191"
              examples:
                토큰 재발급 성공:
                  value: "{\"status\":\"SUCCESS\",\"body\":null,\"timestamp\":\"2026-05-27T19:17:48.5101032\"\
                    }"
        "401":
          description: "401"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-reissue2116916718"
              examples:
                토큰 재발급 실패 - 리프레시 토큰이 만료 되었을 경우:
                  value: "{\"status\":\"ERROR\",\"body\":{\"status\":\"UNAUTHORIZED\"\
                    ,\"message\":\"Refresh Token이 만료되었습니다.\"},\"timestamp\":\"2026-05-27T19:17:49.1486302\"\
                    }"
  /api/signup:
    post:
      tags:
      - User
      summary: 회원가입 API
      description: 회원가입 API
      operationId: user/signup
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/SignupRequest"
            examples:
              user/signup:
                value: "{\"email\":\"test@naver.com\",\"password\":\"testpw1234\"\
                  ,\"name\":\"test\"}"
      responses:
        "201":
          description: "201"
          headers:
            Location:
              description: 리소스 위치
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
              examples:
                user/signup:
                  value: "{\"status\":\"SUCCESS\",\"body\":{\"userId\":1},\"timestamp\"\
                    :\"2026-05-27T19:18:34.4881773\"}"
components:
  schemas:
    ProjectListResponse:
      title: ProjectListResponse
      required:
      - status
      - timestamp
      type: object
      properties:
        body:
          required:
          - content
          - pageInfo
          type: object
          properties:
            pageInfo:
              required:
              - currentPage
              - isFirst
              - isLast
              - pageSize
              - totalElements
              - totalPages
              type: object
              properties:
                isFirst:
                  type: boolean
                  description: 첫 페이지 여부
                isLast:
                  type: boolean
                  description: 마지막 페이지 여부
                totalPages:
                  type: number
                  description: 총 페이지 수
                pageSize:
                  type: number
                  description: 페이지 당 노출 데이터 개수
                currentPage:
                  type: number
                  description: 현재 페이지 번호 (1-indexed)
                totalElements:
                  type: number
                  description: 총 데이터 개수
              description: 페이징 메타데이터
            content:
              type: array
              description: 프로젝트 목록 데이터
              items:
                required:
                - completedTaskCount
                - description
                - endDate
                - inProgressTaskCount
                - progressRate
                - projectId
                - status
                - title
                - totalTaskCount
                type: object
                properties:
                  endDate:
                    type: string
                    description: 프로젝트 마감일 (YYYY-MM-DD)
                  progressRate:
                    type: number
                    description: 프로젝트 전체 진척률 (%)
                  inProgressTaskCount:
                    type: number
                    description: 진행 중인 태스크 개수
                  totalTaskCount:
                    type: number
                    description: 총 태스크 개수
                  description:
                    type: string
                    description: 프로젝트 상세 설명
                  completedTaskCount:
                    type: number
                    description: 완료된 태스크 개수
                  title:
                    type: string
                    description: 프로젝트 제목
                  projectId:
                    type: number
                    description: 프로젝트 고유 ID
                  status:
                    type: string
                    description: "프로젝트 상태 (ACTIVE, COMPLETED, ARCHIVED)"
        timestamp:
          type: string
          description: 응답 시간
        status:
          type: string
          description: 응답 상태
    api-reissue2116916718:
      required:
      - status
      - timestamp
      type: object
      properties:
        body:
          required:
          - message
          - status
          type: object
          properties:
            message:
              type: string
              description: 에러 메시지
            status:
              type: string
              description: 에러 상태
        timestamp:
          type: string
          description: 응답 시간
        status:
          type: string
          description: 응답 상태
    SignupResponse:
      title: SignupResponse
      required:
      - status
      - timestamp
      type: object
      properties:
        body:
          required:
          - userId
          type: object
          properties:
            userId:
              type: number
              description: 생성된 사용자 ID
        timestamp:
          type: string
          description: 응답 시간
        status:
          type: string
          description: 응답 상태
    SignupRequest:
      title: SignupRequest
      required:
      - email
      - name
      - password
      type: object
      properties:
        password:
          type: string
          description: 사용자 비밀번호
        name:
          type: string
          description: 사용자 이름
        email:
          type: string
          description: 사용자 이메일
    CreateProjectRequest:
      title: CreateProjectRequest
      required:
      - description
      - endDate
      - role
      - startDate
      - status
      - title
      type: object
      properties:
        role:
          type: string
          description: 프로젝트 사용자 권한
        endDate:
          type: string
          description: 프로젝트 종료일
        description:
          type: string
          description: 프로젝트 간략 설명
        title:
          type: string
          description: 프로젝트 제목
        startDate:
          type: string
          description: 프로젝트 시작일
        status:
          type: string
          description: 프로젝트 상태
    CreateProjectResponse:
      title: CreateProjectResponse
      required:
      - status
      - timestamp
      type: object
      properties:
        body:
          required:
          - projectId
          type: object
          properties:
            projectId:
              type: number
              description: 프로젝트 ID
        timestamp:
          type: string
          description: 응답 시간
        status:
          type: string
          description: 응답 상태
    LoginRequest:
      title: LoginRequest
      required:
      - email
      - password
      type: object
      properties:
        password:
          type: string
          description: 사용자 비밀번호
        email:
          type: string
          description: 사용자 이메일
    LoginResponse:
      title: LoginResponse
      required:
      - status
      - timestamp
      type: object
      properties:
        body:
          required:
          - email
          - name
          - userId
          type: object
          properties:
            name:
              type: string
              description: 사용자 이름
            userId:
              type: number
              description: 사용자 ID
            email:
              type: string
              description: 사용자 이메일
        timestamp:
          type: string
          description: 응답 시간
        status:
          type: string
          description: 응답 상태
    api-logout229656191:
      required:
      - body
      - status
      - timestamp
      type: object
      properties:
        timestamp:
          type: string
          description: 응답 시간
        status:
          type: string
          description: 응답 상태
