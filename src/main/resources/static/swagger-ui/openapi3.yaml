openapi: 3.0.1
info:
  title: DevLog API
  description: DevLog API Documentation
  version: 0.1.0
servers:
- url: http://localhost:8080
tags: []
paths:
  /api/login:
    post:
      tags:
      - Auth
      summary: 로그인 API
      description: 로그인 API
      operationId: 로그인 성공
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              로그인 성공:
                value: "{\"email\":\"test@naver.com\",\"password\":\"testpw1234\"}"
      responses:
        "200":
          description: "200"
          headers:
            Authorization:
              description: 엑세스 토큰을 Header Authorization에 담아서 응답
              schema:
                type: string
            Set-Cookie:
              description: 리프레시 토큰을 HttpOnly 쿠키에 담아서 응답
              schema:
                type: string
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              examples:
                로그인 성공:
                  value: "{\"status\":\"SUCCESS\",\"body\":{\"userId\":1,\"email\"\
                    :\"test@naver.com\",\"name\":\"test\"},\"timestamp\":\"2026-05-26T18:47:36.4361359\"\
                    }"
  /api/logout:
    post:
      tags:
      - Auth
      summary: 로그아웃 API
      description: 로그아웃 API
      operationId: 로그아웃 성공
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-reissue229656191"
              examples:
                로그아웃 성공:
                  value: "{\"status\":\"SUCCESS\",\"body\":null,\"timestamp\":\"2026-05-26T18:47:36.6919273\"\
                    }"
  /api/project:
    post:
      tags:
      - Project
      summary: 프로젝트 생성 API
      description: 프로젝트 생성 API
      operationId: 프로젝트 생성 성공
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
            examples:
              프로젝트 생성 성공:
                value: "{\"title\":\"테스트\",\"description\":\"테스트 입니다.\",\"status\"\
                  :\"ACTIVE\",\"role\":\"OWNER\",\"startDate\":\"2026-05-26\",\"endDate\"\
                  :\"2026-05-27\"}"
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProjectResponse"
              examples:
                프로젝트 생성 성공:
                  value: "{\"status\":\"SUCCESS\",\"body\":{\"projectId\":1},\"timestamp\"\
                    :\"2026-05-26T18:47:37.7731533\"}"
  /api/reissue:
    post:
      tags:
      - Auth
      summary: 리프레시 토큰 재발급 API
      description: 리프레시 토큰 재발급 API
      operationId: '토큰 재발급 '
      responses:
        "200":
          description: "200"
          headers:
            Authorization:
              description: 엑세스 토큰을 Header Authorization에 담아서 응답
              schema:
                type: string
            Set-Cookie:
              description: 리프레시 토큰을 HttpOnly 쿠키에 담아서 응답
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-reissue229656191"
              examples:
                토큰 재발급 성공:
                  value: "{\"status\":\"SUCCESS\",\"body\":null,\"timestamp\":\"2026-05-26T18:47:35.4817952\"\
                    }"
        "401":
          description: "401"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-reissue2116916718"
              examples:
                토큰 재발급 실패 - 리프레시 토큰이 만료 되었을 경우:
                  value: "{\"status\":\"ERROR\",\"body\":{\"status\":\"UNAUTHORIZED\"\
                    ,\"message\":\"Refresh Token이 만료되었습니다.\"},\"timestamp\":\"2026-05-26T18:47:36.1278299\"\
                    }"
  /api/signup:
    post:
      tags:
      - User
      summary: 회원가입 API
      description: 회원가입 API
      operationId: user/signup
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/SignupRequest"
            examples:
              user/signup:
                value: "{\"email\":\"test@naver.com\",\"password\":\"testpw1234\"\
                  ,\"name\":\"test\"}"
      responses:
        "201":
          description: "201"
          headers:
            Location:
              description: 리소스 위치
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
              examples:
                user/signup:
                  value: "{\"status\":\"SUCCESS\",\"body\":{\"userId\":1},\"timestamp\"\
                    :\"2026-05-26T18:47:38.2745706\"}"
components:
  schemas:
    api-reissue2116916718:
      required:
      - status
      - timestamp
      type: object
      properties:
        body:
          required:
          - message
          - status
          type: object
          properties:
            message:
              type: string
              description: 에러 메시지
            status:
              type: string
              description: 에러 상태
        timestamp:
          type: string
          description: 응답 시간
        status:
          type: string
          description: 응답 상태
    SignupResponse:
      title: SignupResponse
      required:
      - status
      - timestamp
      type: object
      properties:
        body:
          required:
          - userId
          type: object
          properties:
            userId:
              type: number
              description: 생성된 사용자 ID
        timestamp:
          type: string
          description: 응답 시간
        status:
          type: string
          description: 응답 상태
    SignupRequest:
      title: SignupRequest
      required:
      - email
      - name
      - password
      type: object
      properties:
        password:
          type: string
          description: 사용자 비밀번호
        name:
          type: string
          description: 사용자 이름
        email:
          type: string
          description: 사용자 이메일
    CreateProjectRequest:
      title: CreateProjectRequest
      required:
      - description
      - endDate
      - role
      - startDate
      - status
      - title
      type: object
      properties:
        role:
          type: string
          description: 프로젝트 사용자 권한
        endDate:
          type: string
          description: 프로젝트 종료일
        description:
          type: string
          description: 프로젝트 간략 설명
        title:
          type: string
          description: 프로젝트 제목
        startDate:
          type: string
          description: 프로젝트 시작일
        status:
          type: string
          description: 프로젝트 상태
    CreateProjectResponse:
      title: CreateProjectResponse
      required:
      - status
      - timestamp
      type: object
      properties:
        body:
          required:
          - projectId
          type: object
          properties:
            projectId:
              type: number
              description: 프로젝트 ID
        timestamp:
          type: string
          description: 응답 시간
        status:
          type: string
          description: 응답 상태
    LoginRequest:
      title: LoginRequest
      required:
      - email
      - password
      type: object
      properties:
        password:
          type: string
          description: 사용자 비밀번호
        email:
          type: string
          description: 사용자 이메일
    LoginResponse:
      title: LoginResponse
      required:
      - status
      - timestamp
      type: object
      properties:
        body:
          required:
          - email
          - name
          - userId
          type: object
          properties:
            name:
              type: string
              description: 사용자 이름
            userId:
              type: number
              description: 사용자 ID
            email:
              type: string
              description: 사용자 이메일
        timestamp:
          type: string
          description: 응답 시간
        status:
          type: string
          description: 응답 상태
    api-reissue229656191:
      required:
      - body
      - status
      - timestamp
      type: object
      properties:
        timestamp:
          type: string
          description: 응답 시간
        status:
          type: string
          description: 응답 상태
