name: Docker CI/CD with Gradle

on:
  push:
    branches: ["master"]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 테스트를 생략하고 빌드 시간을 단축하려면 끝에 -x test 추가
    - name: Build with Gradle
      run: |
        chmod +x ./gradlew
        ./gradlew clean bootJar

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/devlog:latest

    - name: Deploy to OCI Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/ubuntu/app
          
          # 1. 서버의 .env 파일에 GitHub Secrets 값을 안전하게 덮어씁니다.
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
          echo "PROD_DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}" >> .env
          echo "PROD_JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}" >> .env
          
          # 2. 최신 스프링 부트 이미지 받아오기
          docker compose pull web
          
          # 3. 중요★: 다른 의존성(Redis)은 건드리지 않고 오직 'web'(스프링)만 교체 및 재시작합니다.
          docker compose up -d --no-deps --build web
          
          # 4. 사용하지 않는 구형 이미지 정리
          docker image prune -f